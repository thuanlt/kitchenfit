variables:
  APP_ENV: "stg"

stages:
  - regression

regression:
  stage: regression
  tags:
    - playwright
  rules:
    - if: $CI_PIPELINE_SOURCE == "trigger"   # trigger từ app repo khi deploy
    - if: $CI_PIPELINE_SOURCE == "web"       # chạy thủ công từ GitLab UI
    - if: $CI_PIPELINE_SOURCE == "schedule"  # chạy theo lịch
  script:
    - echo "=== Regression STG — triggered by $CI_PIPELINE_SOURCE ==="
    - npm ci
    - npx playwright install chromium --with-deps
    - npx cross-env APP_ENV=stg npx playwright test --project=regression
    - npx ts-node utils/post-regression-result.ts
  after_script:
    - echo "=== Regression done — exit code $CI_JOB_STATUS ==="
  artifacts:
    when: always
    paths:
      - reports/stg/playwright-report/
      - reports/stg/test-results.json
    expire_in: 14 days
  timeout: 30 minutes
