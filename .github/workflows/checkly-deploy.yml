name: Deploy Checkly Checks

on:
  push:
    branches:
      - master
    paths:
      - 'checkly/**'
      - 'checkly.config.js'
      - 'utils/generate-checkly-checks.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate Checkly checks
        run: node utils/generate-checkly-checks.js

      - name: Deploy to Checkly
        run: npx checkly deploy -f
        env:
          CHECKLY_API_KEY: ${{ secrets.CHECKLY_API_KEY }}
          CHECKLY_ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
